workflows:
  ios-build:
    name: Colony iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
    scripts:
      - name: Appliquer les dépendances Flutter
        script: flutter packages pub get
      - name: Build iOS forcé sans signature
        script: |
          flutter build ios --simulator --no-codesign --build-name=1.0.0 --build-number=1